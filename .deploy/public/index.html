<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Koldo · Segundo cerebro</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #11141b;
    --panel-2: #161a23;
    --border: #1f2533;
    --text: #e6e8ee;
    --muted: #8a93a6;
    --accent: #8b5cf6;
    --accent-2: #06b6d4;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: grid;
    grid-template-columns: 320px 1fr;
    height: 100vh;
  }
  aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
  }
  aside h1 {
    font-size: 18px;
    margin: 0 0 4px;
    letter-spacing: 0.5px;
  }
  aside .sub {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 16px;
  }
  .search {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 13px;
  }
  .search:focus { outline: none; border-color: var(--accent); }
  .tree-group {
    margin-top: 8px;
  }
  .tree-group h3 {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 1px;
    margin: 12px 0 6px;
  }
  .tree-item {
    display: block;
    padding: 6px 10px;
    border-radius: 6px;
    color: var(--text);
    text-decoration: none;
    font-size: 13px;
    cursor: pointer;
    line-height: 1.3;
  }
  .tree-item:hover { background: var(--panel-2); }
  .tree-item.active { background: rgba(139, 92, 246, 0.15); color: #c4b5fd; }
  .tree-item .size { color: var(--muted); font-size: 10px; margin-left: 6px; }
  main {
    overflow-y: auto;
    padding: 32px 48px;
    max-width: 100%;
  }
  main .crumb {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 12px;
    font-family: ui-monospace, "JetBrains Mono", monospace;
  }
  article {
    max-width: 820px;
    line-height: 1.65;
  }
  article h1, article h2, article h3 { color: #fff; }
  article h1 { border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  article a { color: var(--accent-2); }
  article code {
    background: var(--panel-2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 90%;
    font-family: ui-monospace, "JetBrains Mono", monospace;
  }
  article pre {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 14px;
    border-radius: 8px;
    overflow-x: auto;
  }
  article pre code { background: transparent; padding: 0; }
  article table { border-collapse: collapse; margin: 14px 0; }
  article th, article td { border: 1px solid var(--border); padding: 6px 10px; }
  article blockquote {
    border-left: 3px solid var(--accent);
    margin: 12px 0;
    padding: 4px 14px;
    color: var(--muted);
  }
  .empty {
    color: var(--muted);
    text-align: center;
    margin-top: 80px;
  }
  .err {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid var(--danger);
    color: #fca5a5;
    padding: 12px;
    border-radius: 8px;
  }
  @media (max-width: 700px) {
    body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    aside { max-height: 40vh; }
  }
</style>
</head>
<body>
<aside>
  <h1>Koldo</h1>
  <div class="sub">Mi segundo cerebro · privado</div>
  <input id="q" class="search" type="search" placeholder="Buscar…" aria-label="Buscar" />
  <div id="tree" class="tree-group"></div>
</aside>
<main>
  <div id="crumb" class="crumb"></div>
  <article id="content">
    <div class="empty">Elige un archivo del menú lateral.</div>
  </article>
</main>

<!-- marked: render Markdown a HTML. DOMPurify: sanea el HTML resultante.
     CDN restringido por CSP (`script-src 'self' https://cdn.jsdelivr.net`). -->
<script src="https://cdn.jsdelivr.net/npm/marked@13.0.3/marked.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>
<script>
(function () {
  'use strict';
  const treeEl = document.getElementById('tree');
  const articleEl = document.getElementById('content');
  const crumbEl = document.getElementById('crumb');
  const qEl = document.getElementById('q');
  let allItems = [];

  function groupItems(items) {
    const groups = new Map();
    for (const it of items) {
      const parts = it.path.split('/');
      const top = parts.length > 1 ? parts[0] : '(raíz)';
      if (!groups.has(top)) groups.set(top, []);
      groups.get(top).push(it);
    }
    return groups;
  }

  function renderTree(items) {
    treeEl.innerHTML = '';
    const groups = groupItems(items);
    const order = ['(raíz)', 'koldo', 'notes', 'config', 'memory', 'scripts'];
    const sorted = [...groups.keys()].sort((a, b) => {
      const ai = order.indexOf(a), bi = order.indexOf(b);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    for (const g of sorted) {
      const h = document.createElement('h3');
      h.textContent = g;
      treeEl.appendChild(h);
      for (const it of groups.get(g)) {
        const a = document.createElement('a');
        a.className = 'tree-item';
        a.href = '#/' + it.path;
        const label = it.path.split('/').pop();
        a.innerHTML = '';
        const span = document.createElement('span');
        span.textContent = label;
        const sz = document.createElement('span');
        sz.className = 'size';
        sz.textContent = (it.size / 1024).toFixed(1) + ' KB';
        a.appendChild(span);
        a.appendChild(sz);
        a.dataset.path = it.path;
        treeEl.appendChild(a);
      }
    }
    highlightActive();
  }

  function highlightActive() {
    const cur = decodeURIComponent(location.hash.replace(/^#\//, ''));
    document.querySelectorAll('.tree-item').forEach(el => {
      el.classList.toggle('active', el.dataset.path === cur);
    });
  }

  async function loadDoc(path) {
    crumbEl.textContent = path;
    articleEl.innerHTML = '<div class="empty">Cargando…</div>';
    try {
      const r = await fetch('/content/' + path.split('/').map(encodeURIComponent).join('/'), { credentials: 'same-origin' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const md = await r.text();
      const html = marked.parse(md, { mangle: false, headerIds: true });
      const safe = DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
      articleEl.innerHTML = safe;
    } catch (e) {
      articleEl.innerHTML = '<div class="err">No se pudo cargar: ' + String(e.message || e) + '</div>';
    }
    highlightActive();
  }

  function applyFilter() {
    const q = qEl.value.trim().toLowerCase();
    const filtered = q
      ? allItems.filter(it => it.path.toLowerCase().includes(q))
      : allItems;
    renderTree(filtered);
  }

  async function init() {
    try {
      const r = await fetch('/tree.json', { credentials: 'same-origin' });
      if (!r.ok) throw new Error('No se pudo cargar el índice');
      allItems = await r.json();
    } catch (e) {
      treeEl.innerHTML = '<div class="err">' + String(e.message || e) + '</div>';
      return;
    }
    renderTree(allItems);
    if (location.hash.length > 2) {
      loadDoc(decodeURIComponent(location.hash.replace(/^#\//, '')));
    }
  }

  window.addEventListener('hashchange', () => {
    const p = decodeURIComponent(location.hash.replace(/^#\//, ''));
    if (p) loadDoc(p);
  });
  qEl.addEventListener('input', applyFilter);
  init();
})();
</script>
</body>
</html>
