server {
  listen 8080 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;

  # Cabeceras de seguridad (CSP estricta: solo unpkg para marked.js).
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  # Healthcheck SIN auth para que NaN/Kaniko/proxy puedan probar liveness.
  location = /healthz {
    auth_basic off;
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Robots: no indexar (es contenido privado).
  location = /robots.txt {
    auth_basic off;
    add_header Content-Type text/plain;
    return 200 "User-agent: *\nDisallow: /\n";
  }

  # TODO el resto pide Basic Auth (incluso assets) para no filtrar nada.
  auth_basic "Koldo";
  auth_basic_user_file /etc/nginx/.htpasswd;

  # Contenido markdown (servido como text/plain para que el viewer lo fetchee).
  location /content/ {
    types { } default_type "text/plain; charset=utf-8";
    add_header X-Content-Type-Options "nosniff" always;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
