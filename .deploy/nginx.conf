user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout  65;
  server_tokens off;
  client_max_body_size 1m;

  # Logs estructurados, sin User-Agent ni Referer (privacidad).
  log_format koldo '$remote_addr $request_method $status $request_uri';
  access_log /var/log/nginx/access.log koldo;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/markdown;

  include /etc/nginx/conf.d/*.conf;
}
